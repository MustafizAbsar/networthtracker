<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | NetWorth</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        /* --- CSS Variables (Design System) --- */
        :root {
            --primary: #2563EB;
            --primary-hover: #1D4ED8;
            --bg-color: #F8FAFC;
            --surface: #FFFFFF;
            --text-main: #09090B;
            --text-muted: #64748B;
            --border-subtle: #E2E8F0;
            --focus-ring: rgba(37, 99, 235, 0.2);
            --radius-btn: 12px;
            --radius-card: 16px;
            --radius-input: 12px;
            --shadow-soft: 0 4px 24px rgba(0, 0, 0, 0.04);
            --transition: all 0.2s ease;
        }

        /* --- Global Reset & Typography --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px 0;
        }

        h1, h2, .brand {
            font-family: 'Plus Jakarta Sans', sans-serif;
            letter-spacing: -0.02em;
        }

        a {
            text-decoration: none;
            color: var(--primary);
            font-weight: 500;
            transition: var(--transition);
        }

        a:hover {
            color: var(--primary-hover);
        }

        /* --- Auth Container --- */
        .auth-wrapper {
            width: 100%;
            max-width: 440px;
            padding: 24px;
            animation: fadeUp 0.6s ease-out;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand {
            font-size: 28px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-main);
        }

        .brand-icon {
            color: var(--primary);
        }

        .auth-card {
            background: var(--surface);
            padding: 40px;
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--border-subtle);
        }

        .auth-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }

        .auth-subtitle {
            color: var(--text-muted);
            font-size: 15px;
            text-align: center;
            margin-bottom: 32px;
        }

        /* --- Form Elements --- */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-input);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            color: var(--text-main);
            transition: var(--transition);
            background: var(--bg-color);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--surface);
            box-shadow: 0 0 0 3px var(--focus-ring);
        }

        .form-input::placeholder {
            color: #94A3B8;
        }

        /* --- Buttons --- */
        .btn {
            width: 100%;
            padding: 14px 24px;
            border-radius: var(--radius-btn);
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            margin-top: 8px;
            margin-bottom: 16px;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: var(--text-main);
        }

        .btn-outline:hover {
            background: rgba(0,0,0,0.02);
            border-color: #CBD5E1;
        }

        /* --- Divider --- */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-subtle);
        }

        .divider:not(:empty)::before {
            margin-right: .25em;
        }

        .divider:not(:empty)::after {
            margin-left: .25em;
        }

        /* --- Footer --- */
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-muted);
        }

        /* --- Animations --- */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="auth-wrapper">
        <div class="brand-header">
            <a href="index.html" class="brand">
                <i data-lucide="layers" class="brand-icon"></i>
                NetWorth
            </a>
        </div>

        <div class="auth-card">
            <h1 class="auth-title">Create an account</h1>
            <p class="auth-subtitle">Start building your financial future today.</p>

            <form id="signupForm" onsubmit="event.preventDefault(); handleSignUp();">
                <div class="form-group">
                    <label class="form-label" for="name">Full Name</label>
                    <input type="text" id="name" class="form-input" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Create a strong password" required>
                    <p style="font-size: 12px; color: var(--text-muted); margin-top: 6px;">Must be at least 8 characters long.</p>
                </div>

                <button type="submit" class="btn btn-primary" id="signupBtn">
                    Create Account <i data-lucide="arrow-right" style="width: 18px;"></i>
                </button>
            </form>

            <div class="divider">or continue with</div>

            <button class="btn btn-outline" onclick="handleGoogleSignUp()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Google
            </button>
        </div>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Sign in</a>
        </div>
    </div>

</body>
</html>
