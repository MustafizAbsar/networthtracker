<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics | NetWorth</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --primary: #2563EB; --success: #10B981; --danger: #EF4444; --warning: #F59E0B;
            --bg-color: #F8FAFC; --surface: #FFFFFF;
            --text-main: #09090B; --text-muted: #64748B;
            --border-subtle: #E2E8F0; --radius-card: 16px;
            --shadow-soft: 0 4px 24px rgba(0, 0, 0, 0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); display: flex; min-height: 100vh; }
        
        /* --- Sidebar --- */
        .sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border-subtle); position: fixed; height: 100vh; padding: 24px; }
        .brand { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 8px; margin-bottom: 32px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px; color: var(--text-muted); font-size: 14px; font-weight: 500; margin-bottom: 4px; }
        .nav-item.active { background: rgba(37, 99, 235, 0.08); color: var(--primary); }

        /* --- Content --- */
        .main-content { flex: 1; margin-left: 260px; padding: 32px 40px; }
        .top-header { margin-bottom: 40px; }
        
        .charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
        .chart-card { background: var(--surface); padding: 24px; border-radius: var(--radius-card); border: 1px solid var(--border-subtle); box-shadow: var(--shadow-soft); }
        .chart-placeholder { height: 250px; background: var(--bg-color); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 14px; margin-top: 20px; }

        @media (max-width: 992px) { .charts-grid { grid-template-columns: 1fr; } }
        @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; padding: 24px; } }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand"><i data-lucide="layers" style="color: var(--primary);"></i> NetWorth</div>
        <nav>
            <a href="dashboard.html" class="nav-item"><i data-lucide="layout-dashboard"></i> Dashboard</a>
            <a href="reports.html" class="nav-item active"><i data-lucide="bar-chart-2"></i> Analytics</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <h1 class="page-title">Analytics</h1>
        </header>

        <div class="charts-grid">
            <div class="chart-card">
                <h2>Net Worth Growth</h2>
                <div class="chart-placeholder">Growth Trendline Visualization</div>
            </div>
            <div class="chart-card">
                <h2>Assets vs Liabilities</h2>
                <div class="chart-placeholder">Composition Stacked Bar Chart</div>
            </div>
            <div class="chart-card">
                <h2>Monthly Cash Flow</h2>
                <div class="chart-placeholder">Income vs Expense Bar Chart</div>
            </div>
            <div class="chart-card">
                <h2>Expense Breakdown</h2>
                <div class="chart-placeholder">Categorical Donut Chart</div>
            </div>
        </div>
    </main>

    <script> lucide.createIcons(); </script>
</body>
</html>
