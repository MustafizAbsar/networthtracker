<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings | NetWorth</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #2563EB; --bg-color: #F8FAFC; --surface: #FFFFFF;
            --text-main: #09090B; --text-muted: #64748B; --border-subtle: #E2E8F0;
            --radius-card: 16px; --radius-input: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); display: flex; min-height: 100vh; }
        
        .sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border-subtle); position: fixed; height: 100vh; padding: 24px; }
        .brand { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 8px; margin-bottom: 32px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px; color: var(--text-muted); font-size: 14px; font-weight: 500; margin-bottom: 4px; }
        .nav-item.active { background: rgba(37, 99, 235, 0.08); color: var(--primary); }

        .main-content { flex: 1; margin-left: 260px; padding: 32px 40px; max-width: 800px; }
        .form-card { background: var(--surface); padding: 40px; border-radius: var(--radius-card); border: 1px solid var(--border-subtle); box-shadow: 0 4px 24px rgba(0,0,0,0.04); }
        .form-group { margin-bottom: 24px; }
        .form-label { font-size: 14px; font-weight: 500; margin-bottom: 8px; display: block; }
        .form-input { width: 100%; padding: 12px 16px; border: 1px solid var(--border-subtle); border-radius: var(--radius-input); font-size: 15px; }
        .btn { padding: 12px 24px; border-radius: var(--radius-input); font-weight: 600; border: none; cursor: pointer; background: var(--primary); color: white; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand"><i data-lucide="layers" style="color: var(--primary);"></i> NetWorth</div>
        <nav>
            <a href="dashboard.html" class="nav-item"><i data-lucide="layout-dashboard"></i> Dashboard</a>
            <a href="profile.html" class="nav-item active"><i data-lucide="user"></i> Profile</a>
        </nav>
    </aside>

    <main class="main-content">
        <h1>Profile Settings</h1>
        <br>
        <div class="form-card">
            <form onsubmit="event.preventDefault(); alert('Profile Updated');">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-input" value="John Doe">
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" value="user@example.com" disabled>
                </div>
                <div class="form-group">
                    <label class="form-label">Currency Preference</label>
                    <select class="form-input">
                        <option>INR (₹)</option>
                        <option>USD ($)</option>
                    </select>
                </div>
                <button class="btn">Save Changes</button>
            </form>
        </div>
    </main>

    <script> lucide.createIcons(); </script>
</body>
</html>
