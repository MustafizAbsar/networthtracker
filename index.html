<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetWorth | Loading...</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script src="js/firebase-config.js"></script>
    
    <style>
        body { 
            margin: 0; height: 100vh; display: flex; 
            align-items: center; justify-content: center; 
            background-color: #F8FAFC; font-family: 'Inter', sans-serif; 
        }
        .loader {
            width: 40px; height: 40px; border: 3px solid #E2E8F0;
            border-top: 3px solid #2563EB; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loader"></div>

    <script>
        // Use the auth instance from firebase-config.js
        auth.onAuthStateChanged((user) => {
            if (user) {
                // User is logged in, send to Dashboard
                window.location.href = 'dashboard.html';
            } else {
                // User is not logged in, send to Login
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
